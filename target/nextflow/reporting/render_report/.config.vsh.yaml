name: "render_report"
namespace: "reporting"
version: "build_main"
argument_groups:
- name: "Inputs"
  arguments:
  - type: "file"
    name: "--input_task_results"
    description: "Combined task results JSON file"
    info:
      format:
        type: "json"
        schema: "/common/schemas/results_v4/combined_output.json"
    example:
    - "resources_test/openproblems/task_results_v4/processed/combined_output.json"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Outputs"
  arguments:
  - type: "file"
    name: "--output"
    description: "HTML report file"
    info:
      format:
        type: "html"
    default:
    - "report.html"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
resources:
- type: "r_script"
  path: "script.R"
  is_executable: true
- type: "file"
  path: "report.qmd"
  dest: "report.qmd"
- type: "file"
  path: "functions.R"
  dest: "functions.R"
- type: "file"
  path: "logo.svg"
  dest: "logo.svg"
description: "Render a HTML report summarizing the results"
test_resources:
- type: "python_script"
  path: "run_and_check_output.py"
  is_executable: true
- type: "file"
  path: "resources_test/openproblems/task_results_v4"
  dest: "resources_test/openproblems/task_results_v4"
info: null
status: "enabled"
scope:
  image: "public"
  target: "public"
license: "MIT"
links:
  repository: "https://github.com/openproblems-bio/openproblems"
  docker_registry: "ghcr.io"
runners:
- type: "executable"
  id: "executable"
  docker_setup_strategy: "ifneedbepullelsecachedbuild"
- type: "nextflow"
  id: "nextflow"
  directives:
    label:
    - "lowmem"
    - "lowtime"
    - "lowcpu"
    tag: "$id"
  auto:
    simplifyInput: true
    simplifyOutput: false
    transcript: false
    publish: false
  config:
    labels:
      lowmem: "memory = 20.Gb"
      midmem: "memory = 50.Gb"
      highmem: "memory = 100.Gb"
      lowcpu: "cpus = 5"
      midcpu: "cpus = 15"
      highcpu: "cpus = 30"
      lowtime: "time = 1.h"
      midtime: "time = 4.h"
      hightime: "time = 8.h"
      veryhightime: "time = 24.h"
    script:
    - "process.errorStrategy = 'ignore'"
  debug: false
  container: "docker"
engines:
- type: "docker"
  id: "docker"
  image: "openproblems/base_r:1.0.0"
  namespace_separator: "/"
  setup:
  - type: "docker"
    run:
    - "export QUARTO_VERSION=\"1.7.32\" && \\\nmkdir -p /opt/quarto/${QUARTO_VERSION}\
      \ && \\\nwget -O quarto.tar.gz \"https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz\"\
      \ && \\\ntar -zxvf quarto.tar.gz -C \"/opt/quarto/${QUARTO_VERSION}\" --strip-components=1\
      \ && \\\nln -s /opt/quarto/${QUARTO_VERSION}/bin/quarto /usr/local/bin/quarto\
      \ && \\\nrm quarto.tar.gz\n"
  - type: "r"
    cran:
    - "commonmark"
    - "dplyr"
    - "funkyheatmap"
    - "ggplot2"
    - "here"
    - "htmltools"
    - "jsonlite"
    - "knitr"
    - "patchwork"
    - "purrr"
    - "quarto"
    - "rcrossref"
    - "reactable"
    - "scales"
    - "stringr"
    - "tibble"
    - "tidyr"
    - "xfun"
    bioc_force_install: false
    warnings_as_errors: true
  entrypoint: []
  cmd: null
build_info:
  config: "src/reporting/render_report/config.vsh.yaml"
  runner: "nextflow"
  engine: "docker"
  output: "target/nextflow/reporting/render_report"
  executable: "target/nextflow/reporting/render_report/main.nf"
  viash_version: "0.9.4"
  git_commit: "76e280c7477ea73c9bb97ae65e22ddb206be3949"
  git_remote: "https://github.com/openproblems-bio/openproblems"
  git_tag: "v1.0.0-1434-g76e280c7"
package_config:
  name: "openproblems"
  version: "build_main"
  description: "Open Problems is a living, extensible, community-guided benchmarking\
    \ platform.\n"
  info:
    test_resources:
    - type: "s3"
      path: "s3://openproblems-data/resources_test/common"
      dest: "resources_test/common"
    - type: "s3"
      path: "s3://openproblems-data/resources_test/openproblems"
      dest: "resources_test/openproblems"
  viash_version: "0.9.4"
  source: "src"
  target: "target"
  config_mods:
  - ".runners[.type == \"nextflow\"].config.labels := { lowmem : \"memory = 20.Gb\"\
    , midmem : \"memory = 50.Gb\", highmem : \"memory = 100.Gb\", lowcpu : \"cpus\
    \ = 5\", midcpu : \"cpus = 15\", highcpu : \"cpus = 30\", lowtime : \"time = 1.h\"\
    , midtime : \"time = 4.h\", hightime : \"time = 8.h\", veryhightime : \"time =\
    \ 24.h\" }\n.runners[.type == \"nextflow\"].config.script := \"process.errorStrategy\
    \ = 'ignore'\"\n"
  keywords:
  - "openproblems"
  - "benchmarking"
  - "single-cell omics"
  license: "MIT"
  organization: "openproblems-bio"
  references:
    doi:
    - "10.1038/s41587-025-02694-w"
  links:
    repository: "https://github.com/openproblems-bio/openproblems"
    docker_registry: "ghcr.io"
    issue_tracker: "https://github.com/openproblems-bio/openproblems/issues"
